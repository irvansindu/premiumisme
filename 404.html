<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Halaman Tidak Ditemukan</title>
  <meta name="description" content="Halaman yang Anda cari tidak ditemukan." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/global.css" />
  <link rel="stylesheet" href="/src/landing.css" />
  <style>
    .not-found-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 80vh;
      text-align: center;
      padding: 2rem;
      position: relative;
      z-index: 10;
    }
    .error-card {
      padding: 4rem 2rem;
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      background: rgba(30, 27, 75, 0.35);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 24px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      animation: cardEntrance 0.8s ease-out, cardFloat 6s ease-in-out infinite alternate 0.8s;
      transform-style: preserve-3d;
      perspective: 1000px;
    }
    @keyframes cardFloat {
      0% { transform: translateY(0) rotateX(2deg) rotateY(-2deg); }
      100% { transform: translateY(-15px) rotateX(-2deg) rotateY(2deg); }
    }
    .error-code {
      font-size: clamp(80px, 15vw, 150px);
      font-weight: 800;
      background: linear-gradient(135deg, #a78bfa, #6366f1);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
      line-height: 1;
      text-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
      animation: textFloat 3s ease-in-out infinite alternate, neonPulse 2s infinite alternate;
    }
    @keyframes textFloat {
      0% { transform: translateY(0) scale(1); }
      100% { transform: translateY(-10px) scale(1.05); }
    }
    @keyframes neonPulse {
      0% { text-shadow: 0 10px 30px rgba(99, 102, 241, 0.3), 0 0 10px rgba(167, 139, 250, 0.4); }
      100% { text-shadow: 0 15px 40px rgba(99, 102, 241, 0.6), 0 0 25px rgba(167, 139, 250, 0.8); }
    }
    .error-message {
      font-size: clamp(16px, 3.5vw, 20px);
      color: #e2e8f0;
      margin-bottom: 2.5rem;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
      opacity: 0.9;
    }
    .home-cta-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white;
      padding: 1rem 2rem;
      border-radius: 14px;
      font-size: 1.1rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
    }
    .home-cta-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(99, 102, 241, 0.5);
    }
  </style>
</head>
<body class="dark-theme">

  <!-- Header Minimalis -->
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="header-logo"></a>
      <div class="header-actions">
        <a href="/store.html" class="btn-login" style="padding: 0.5rem 1rem; text-decoration: none;">Ke Store</a>
      </div>
    </div>
  </header>

  <!-- Animated Background Orbs -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
  </div>

  <!-- Content 404 -->
  <main class="not-found-container">
    <div class="error-card">
      <h1 class="error-code">404</h1>
      <p class="error-message">Ups! Halaman yang Anda cari sepertinya sudah hilang ditelan <i>black hole</i> antariksa.</p>
      <a href="/" class="home-cta-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Kembali ke Bumi (Home)
      </a>
    </div>
  </main>

  <footer class="site-footer" style="margin-top: 2rem; background: transparent; border-top: none;">
    <div class="footer-inner" style="text-align: center; color: var(--text-muted); font-size: 0.9rem;">
      <p class="footer-bottom-text">© 2026 <span class="header-logo"></span>. All rights reserved.</p>
    </div>
  </footer>

  <script type="module" src="/src/global.js"></script>
</body>
</html>
