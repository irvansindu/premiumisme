<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premiumisme - Solusi Produk Digital Terbaik</title>
  <meta name="description" content="Premiumisme - Solusi produk digital premium terbaik. Canva Pro, ChatGPT Plus, CapCut Pro, dan lainnya dengan harga terjangkau." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/landing.css" />
</head>
<body>
  <!-- Animated Background Orbs -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
    <div class="orb orb-5"></div>
  </div>

  <!-- Main Glass Card Container -->
  <main class="landing-container">
    <div class="glass-card">
      <!-- Profile Section (Dynamic) -->
      <div id="profile-container" class="profile-section">
        <div class="avatar-ring">
          <div class="avatar">
            <span class="avatar-text">...</span>
          </div>
        </div>
        <h1 class="brand-name">...</h1>
        <p class="tagline">...</p>
      </div>

      <!-- Link Buttons (Dynamic) -->
      <div id="links-container" class="links-section">
        <!-- Links will be rendered here -->
      </div>

      <!-- Social Links (Dynamic) -->
      <div id="socials-container" class="social-section">
        <!-- Socials will be rendered here -->
      </div>

      <p class="footer-text">© 2024 Premiumisme. All rights reserved.</p>
    </div>
  </main>

  <script type="module" src="/src/landing.js"></script>
</body>
</html>
