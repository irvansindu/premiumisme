<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reseller Premiumisme</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/reseller.css" />
</head>
<body>
  <!-- Animated Background Orbs -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <main class="reseller-container">
    <div class="glass-card">
      <header class="reseller-header">
        <a href="/index.html" class="back-btn">← Kembali</a>
      </header>

      <h1 id="hero-title" class="hero-title">...</h1>
      <p id="hero-subtitle" style="text-align: center; color: rgba(255,255,255,0.7); max-width: 600px; margin: 0 auto 2rem; line-height: 1.6;">...</p>

      <!-- Process Path Grid -->
      <div id="process-grid" class="process-grid-wrapper">
        <!-- Steps will be rendered here -->
      </div>

      <!-- Contoh Simpel Box -->
      <div id="profit-box" class="profit-box-container">
        <!-- Profit example will be rendered here -->
      </div>

      <!-- Keunggulan Premiumisme -->
      <div id="advantages-box" class="advantages-box-container">
        <!-- Advantages will be rendered here -->
      </div>

      <!-- CTA Box -->
      <div id="cta-box" class="cta-box-container">
        <!-- CTA will be rendered here -->
      </div>

      <div style="text-align: center; margin-top: 2rem;">
        <a href="/" style="color: rgba(255,255,255,0.5); text-decoration: none; font-size: 0.9rem;">Kembali ke Menu Utama</a>
      </div>
    </div>
  </main>

  <script type="module" src="/src/reseller.js"></script>
</body>
</html>
